<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDS リスクアセスメントツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Meiryo', sans-serif;
      background: #f5f5f5; color: #333;
      height: 100vh; display: flex; flex-direction: column;
    }

    header {
      background: #1a56a0; color: #fff;
      padding: 12px 20px; font-size: 16px; font-weight: bold;
      flex-shrink: 0;
    }

    .layout {
      display: flex; flex: 1; overflow: hidden; gap: 0;
    }

    /* ---- 左カラム（検索） ---- */
    .sidebar {
      width: 360px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-right: 1px solid #ddd;
      background: #fff; overflow: hidden;
    }
    .sidebar-inner {
      padding: 16px; overflow-y: auto; flex: 1;
    }

    .search-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .search-row input {
      flex: 1; padding: 8px 10px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 4px;
    }
    .btn {
      padding: 8px 16px; font-size: 13px; cursor: pointer;
      background: #1a56a0; color: #fff;
      border: none; border-radius: 4px; white-space: nowrap;
    }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-outline {
      background: #fff; color: #1a56a0; border: 1px solid #1a56a0;
    }
    .btn:disabled { background: #aaa; cursor: default; }

    #status { font-size: 12px; color: #888; margin-bottom: 4px; }

    .result-item {
      padding: 9px 10px; border-bottom: 1px solid #eee;
      cursor: pointer; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
    }
    .result-item:hover { background: #f0f6ff; }
    .result-item.selected { background: #ddeeff; font-weight: bold; }
    .badge {
      font-size: 11px; background: #e8e8e8;
      border-radius: 3px; padding: 1px 6px;
      min-width: 24px; text-align: center; flex-shrink: 0;
    }

    /* ---- 右カラム（プレビュー） ---- */
    .preview-col {
      flex: 1; display: none; flex-direction: column;
      overflow: hidden; background: #f0f0f0;
    }
    .preview-col.visible { display: flex; }

    .preview-controls {
      background: #fff; border-bottom: 1px solid #ddd;
      padding: 10px 16px; flex-shrink: 0;
      display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
    }
    .selected-name {
      font-size: 14px; font-weight: bold; color: #1a56a0;
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .form-group { display: flex; flex-direction: column; gap: 3px; }
    .form-group label { font-size: 11px; color: #666; }
    .form-group input {
      padding: 6px 8px; font-size: 13px;
      border: 1px solid #ccc; border-radius: 4px; width: 160px;
    }
    .btn-row { display: flex; gap: 8px; align-items: flex-end; }

    .preview-frame-wrap {
      flex: 1; overflow: auto; padding: 12px;
    }
    #previewFrame {
      width: 850px; height: 2500px;
      border: none; display: block;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    .empty-preview {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #bbb; font-size: 14px;
    }
  </style>
</head>
<body>

<header>SDS リスクアセスメントツール</header>

<div class="layout">

  <!-- 左：検索 -->
  <div class="sidebar">
    <div class="sidebar-inner">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="材料名を入力（例：ファインウレタン）" />
        <button class="btn" onclick="search()">検索</button>
      </div>
      <div id="status"></div>
      <div id="results"></div>
    </div>
  </div>

  <!-- 右：プレビュー -->
  <div class="preview-col" id="previewCol">
    <div class="preview-controls" id="previewControls">
      <span class="selected-name" id="selectedName"></span>
      <div class="form-group">
        <label>実施者</label>
        <input type="text" id="implementor" placeholder="氏名を入力" />
      </div>
      <div class="form-group">
        <label>実施日</label>
        <input type="date" id="date" />
      </div>
      <div class="btn-row">
        <button class="btn btn-sm btn-outline" onclick="updatePreview()">更新</button>
        <button class="btn btn-sm" onclick="openReport()">印刷</button>
      </div>
    </div>
    <div class="preview-frame-wrap">
      <div id="previewLoading" style="display:none; padding:40px; text-align:center; color:#888; font-size:13px;">
        読み込み中...（GHS画像の取得に数秒かかります）
      </div>
      <iframe id="previewFrame"></iframe>
    </div>
  </div>

  <!-- プレビュー未選択時 -->
  <div class="empty-preview" id="emptyPreview">
    左の検索から材料を選択するとプレビューが表示されます
  </div>

</div>

<script>
  let selectedId = null;
  let scriptUrl  = '';  // 印刷タブ用

  google.script.run
    .withSuccessHandler(url => { scriptUrl = url; })
    .getScriptUrl();

  document.getElementById('date').value = new Date().toISOString().slice(0, 10);

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  function search() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    document.getElementById('status').textContent = '検索中...';
    document.getElementById('results').innerHTML = '';

    google.script.run
      .withSuccessHandler(renderResults)
      .withFailureHandler(err => {
        document.getElementById('status').textContent = 'エラー: ' + err.message;
      })
      .searchMaterials(q);
  }

  function renderResults(items) {
    const status  = document.getElementById('status');
    const results = document.getElementById('results');
    if (!items || items.length === 0) {
      status.textContent = '該当する材料が見つかりませんでした';
      return;
    }
    status.textContent = `${items.length}件見つかりました`;
    results.innerHTML = items.map(item => `
      <div class="result-item" onclick="select(${item.material_id}, '${escHtml(item.材料名)}')">
        <span class="badge">${escHtml(item.頭文字 || '')}</span>
        ${escHtml(item.材料名)}
      </div>
    `).join('');
  }

  function select(id, name) {
    selectedId = id;
    document.querySelectorAll('.result-item').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    document.getElementById('selectedName').textContent = name;
    document.getElementById('previewCol').classList.add('visible');
    document.getElementById('emptyPreview').style.display = 'none';
    updatePreview();
  }

  function updatePreview() {
    if (!selectedId) return;
    const implementor = document.getElementById('implementor').value;
    const date        = document.getElementById('date').value;
    const frame   = document.getElementById('previewFrame');
    const loading = document.getElementById('previewLoading');
    frame.style.display   = 'none';
    loading.style.display = 'block';
    google.script.run
      .withSuccessHandler(html => {
        loading.style.display = 'none';
        frame.srcdoc          = html;
        frame.style.display   = 'block';
      })
      .withFailureHandler(err => {
        loading.style.display    = 'none';
        loading.textContent      = 'エラー: ' + err.message;
        loading.style.display    = 'block';
        loading.style.color      = 'red';
      })
      .getReportHtml(selectedId, implementor, date);
  }

  function openReport() {
    if (!selectedId) return;
    const implementor = document.getElementById('implementor').value;
    const date        = document.getElementById('date').value;
    if (!implementor) { alert('実施者を入力してください'); return; }
    if (!date)        { alert('実施日を入力してください'); return; }
    const url = `${scriptUrl}?page=report&id=${selectedId}`
      + `&implementor=${encodeURIComponent(implementor)}`
      + `&date=${encodeURIComponent(date)}`;
    window.open(url, '_blank');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
